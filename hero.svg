<svg width="760" height="205" viewBox="0 0 760 205" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Matt - Backend Engineer</title>
  <desc id="desc">A compact GitHub profile hero title for Matt.</desc>

  <style>
    .name {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      font-size: 96px;
      font-weight: 900;
      letter-spacing: -5px;
      fill: #f0f6fc;
    }

    .role {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      font-size: 28px;
      font-weight: 700;
      fill: #2f81f7;
    }

    .tagline {
      font-family: ui-serif, Georgia, Cambria, "Times New Roman", serif;
      font-size: 20px;
      font-style: italic;
      fill: #c9d1d9;
    }

    .line {
      stroke: #2f81f7;
      stroke-width: 3;
      stroke-linecap: round;
      opacity: .75;
    }

    @media (prefers-color-scheme: light) {
      .name { fill: #24292f; }
      .tagline { fill: #57606a; }
    }
  </style>

  <text x="380" y="86" text-anchor="middle" class="name">Matt</text>
  <text x="380" y="124" text-anchor="middle" class="role">Backend Engineer</text>
  <text x="380" y="157" text-anchor="middle" class="tagline">Building reliable backend systems.</text>
  <line x1="342" y1="185" x2="418" y2="185" class="line"/>
</svg>
