<svg width="420" height="24" viewBox="0 0 420 24" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>
.word{
  fill:#c9d1d9;
  font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Noto Sans SC","Noto Sans JP",Helvetica,Arial,sans-serif;
  font-size:16px;
  font-weight:500;
  letter-spacing:.6px;
}
.dot{
  fill:#2f81f7;
