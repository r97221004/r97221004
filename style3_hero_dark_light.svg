<svg xmlns="http://www.w3.org/2000/svg" width="620" height="150" viewBox="0 0 620 150" role="img" aria-label="Matt - Backend Engineer">
  <style>
    .name {
      fill: #0d1117;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 84px;
      font-weight: 900;
      letter-spacing: -5px;
    }
    .role {
      fill: #2f81f7;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: .2px;
    }
    .tagline {
      fill: #57606a;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 17px;
      font-style: italic;
      font-weight: 400;
    }
    @media (prefers-color-scheme: dark) {
      .name { fill: #f0f6fc; }
      .tagline { fill: #8b949e; }
    }
  </style>

  <rect width="620" height="150" fill="transparent"/>
  <text class="name" x="310" y="76" text-anchor="middle">Matt</text>
  <text class="role" x="310" y="108" text-anchor="middle">Backend Engineer</text>
  <text class="tagline" x="310" y="134" text-anchor="middle">Building reliable backend systems.</text>
</svg>
