<svg width="760" height="176" viewBox="0 0 760 176" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>
.name{
  fill:#f0f6fc;
  font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  font-size:118px;
  font-weight:900;
  letter-spacing:-6px;
}
.role{
  fill:#2f81f7;
  font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  font-size:24px;
  font-weight:600;
  letter-spacing:.2px;
}
.tagline{
  fill:#8b949e;
  font-family:Georgia,"Times New Roman",serif;
  font-size:21px;
  font-style:italic;
  font-weight:500;
}
.line{
  stroke:#2f81f7;
  stroke-width:3;
  stroke-linecap:round;
}
@media (prefers-color-scheme: light){
  .name{fill:#24292f;}
  .tagline{fill:#57606a;}
}
</style>

<text x="380" y="96" text-anchor="middle" class="name">Matt</text>
<text x="380" y="126" text-anchor="middle" class="role">Backend Engineer</text>
<text x="380" y="153" text-anchor="middle" class="tagline">Building reliable backend systems.</text>
<line x1="342" y1="172" x2="418" y2="172" class="line"/>
</svg>
