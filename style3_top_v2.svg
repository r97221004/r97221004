<svg width="760" height="220" viewBox="0 0 760 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .name {
      fill: #f0f6fc;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 116px;
      font-weight: 900;
      letter-spacing: -6px;
    }
    .role {
      fill: #2f81f7;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 26px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }
    .tagline {
      fill: #8b949e;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 22px;
      font-style: italic;
      font-weight: 500;
    }
    .line {
      stroke: #2f81f7;
      stroke-width: 3;
      stroke-linecap: round;
    }

    @media (prefers-color-scheme: light) {
      .name { fill: #24292f; }
      .tagline { fill: #57606a; }
    }
  </style>

  <text x="380" y="98" text-anchor="middle" class="name">Matt</text>
  <text x="380" y="130" text-anchor="middle" class="role">Backend Engineer</text>
  <text x="380" y="162" text-anchor="middle" class="tagline">Building reliable backend systems.</text>
  <line x1="340" y1="196" x2="420" y2="196" class="line"/>
</svg>
